{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Add Expense</h1>
            <p class="auth-subtitle">Record a new transaction</p>
        </div>
        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}
            <form method="POST" action="{{ url_for('add_expense') }}">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" placeholder="0.00"
                           step="0.01" min="0.01"
                           value="{{ amount or '' }}"
                           required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category"
                            class="form-input"
                            required>
                        <option value="">Select a category</option>
                        <option value="Food" {% if category == 'Food' %}selected{% endif %}>Food</option>
                        <option value="Transport" {% if category == 'Transport' %}selected{% endif %}>Transport</option>
                        <option value="Bills" {% if category == 'Bills' %}selected{% endif %}>Bills</option>
                        <option value="Health" {% if category == 'Health' %}selected{% endif %}>Health</option>
                        <option value="Entertainment" {% if category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
                        <option value="Shopping" {% if category == 'Shopping' %}selected{% endif %}>Shopping</option>
                        <option value="Other" {% if category == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ date or '' }}"
                           max="{{ today }}"
                           required>
                </div>

                <div class="form-group">
                    <label for="description">Description (optional)</label>
                    <textarea id="description" name="description"
                              class="form-input"
                              placeholder="What was this for?"
                              maxlength="500"
                              rows="3"></textarea>
                    {% if description %}
                    <script>document.getElementById('description').value = "{{ description }}";</script>
                    {% endif %}
                </div>

                <button type="submit" class="btn-submit">Add Expense</button>
            </form>
            <p class="auth-switch">
                Changed your mind? <a href="{{ url_for('profile') }}">Back to profile</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
